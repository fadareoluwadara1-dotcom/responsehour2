<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>
    <style>
        body {
            /* Whitish blue background */
            background-color: #f0f8ff; 
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            width: 350px;
            padding: 20px;
            background-color: #ffffff; /* White background for the form area */
            border: 1px solid #000000;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            /* Black border for each input/textarea */
            border: 1px solid #000000;
            padding: 10px;
            margin-bottom: 15px;
        }

        .button-container {
            display: flex;
            justify-content: flex-end; /* Places button at the right corner */
        }

        .submit-btn {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: 1px solid #000000;
            border-radius:10px;
            cursor: pointer;
            font-weight: bold;
        }

        .submit-btn:hover {
            background-color: #006400; /* Darker green on hover */
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/mdapaykd" method="POST" class="contact-form">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>

        <label for="phone">Phone Number (Optional):</label>
        <input type="tel" id="phone" name="phone" placeholder="+1234567890">

<label for="response-time">How soon should we respond (in minutes):</label>
<input type="number" id="response-time" name="response-time" placeholder="e.g., 30" min="0">


        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" placeholder="Type your message here..." required></textarea>

        <div class="button-container">
            <button type="submit" class="submit-btn">POST</button>
        </div>
    </form>

</body>
</html>

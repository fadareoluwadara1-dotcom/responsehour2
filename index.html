<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .contact-form {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px; /* Perfect for both mobile and desktop */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Professional depth */
            border: 1px solid #e0e0e0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            border: 1px solid #ccc;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #4a90e2; /* Subtle blue highlight on focus */
        }

        .button-container {
            display: flex;
            justify-content: flex-end;
        }

        .submit-btn {
            background-color: #2e7d32; /* Professional green */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <form action="https://formspree.io/f/mdapaykd" method="POST" class="contact-form">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your Full Name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your Email" required>

        <label for="phone">Phone Number (Optional)</label>
        <input type="tel" id="phone" name="phone" placeholder="+1234567890">

        <label for="response-time">How soon should we respond (in minutes)</label>
        <input type="number" id="response-time" name="response-time" placeholder="e.g., 30" min="0">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Type your message here..." required></textarea>

        <div class="button-container">
            <button type="submit" class="submit-btn">POST</button>
        </div>
    </form>

</body>
</html>
